<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart - LocalShop</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>LocalShop</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="login.html" id="auth-link">Login</a>
        </nav>
    </header>

    <section class="cart-page-container">
        <h2>🛍️ Your Shopping Cart</h2>

        <div class="cart-content-wrapper">
            
            <div class="cart-items-list">
                <div id="cart-items-container">
                    <p class="empty-cart-message">Your cart is empty. Start shopping!</p>
                </div>
            </div>

            <div class="order-summary-card">
                <h3>Order Summary</h3>
                <div class="summary-line">
                    <span>Subtotal (<span id="total-items-count">0</span> items)</span>
                    <span id="summary-subtotal">₹0</span>
                </div>
                <div class="summary-line">
                    <span>Shipping Estimate</span>
                    <span>₹50</span>
                </div>
                <div class="summary-line total">
                    <span>Grand Total</span>
                    <span id="summary-grand-total">₹50</span>
                </div>
                
                <button class="btn checkout-btn" disabled>Proceed to Checkout</button>
            </div>
            
        </div>
    </section>

    <footer>
        <p>© 2025 LocalShop | Connecting Local Sellers to You</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
