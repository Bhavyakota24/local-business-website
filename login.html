<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - LocalShop</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>LocalShop</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <div class="auth-container">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" placeholder="Email" required />
            <input type="password" placeholder="Password" required />
            <button type="submit" class="btn">Login</button>
        </form>
        <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // --- FEATURE 1: Set Login Status ---
            // In a real application, server-side authentication would happen here.
            // We simulate a successful login by setting a localStorage flag:
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', document.querySelector('input[type="email"]').value); 

            alert('Login successful! You can now add products to your cart.');
            
            // Redirect to the products page
            window.location.href = 'products.html'; 
        });
    </script>
</body>
</html>
